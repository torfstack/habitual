[tools]
go = "1.26.1"
"go:github.com/a-h/templ/cmd/templ" = "0.3.1001"
"go:github.com/sqlc-dev/sqlc/cmd/sqlc" = "1.30.0"
"go:github.com/pressly/goose/v3/cmd/goose" = "3.27.0"

[tasks.generate]
description = "Run all code generators"
run = ["templ generate", "sqlc generate"]

[tasks.test]
description = "Run all tests"
run = "go test ./..."

[tasks.test-integration]
description = "Run integration tests (requires Docker)"
run = "go test ./internal/service/... -v -timeout 120s"

[tasks.build]
description = "Build the binary"
run = "go build -o habitual ./cmd/habitual"

[tasks.dev]
description = "Run the server (requires DATABASE_URL)"
run = "go run ./cmd/habitual"

[tasks.docker-rebuild]
description = "Tear down and rebuild Docker containers"
run = ["docker compose down", "docker compose up -d --build"]

[tasks.docker-up]
description = "Build and start Docker containers"
run = "docker compose up -d --build"

[tasks.docker-publish]
description = "Build and publish the Docker image"
run = "docker buildx build . -t ghcr.io/torfstack/habitual:latest --push"
