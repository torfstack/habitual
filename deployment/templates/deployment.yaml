apiVersion: apps/v1
kind: Deployment
metadata:
  name: habitual
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: habitual
  template:
    metadata:
      labels:
        app: habitual
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: habitual
          image: ghcr.io/torfstack/habitual:latest
          ports:
            - containerPort: 8080
              hostPort: 5000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: habitual
                  key: DATABASE_URL
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
